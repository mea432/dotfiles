# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
  # 'exec-and-forget borders',
  'exec-and-forget sketchybar'
]

# Start AeroSpace at login
start-at-login = true

# Automatically reload the config when the config file is saved
# After setting this to true, reload once manually to start the auto-reloading
# auto-reload-config = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 75

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center'] # Mouse lazily follows focused monitor (default in i3)
on-focus-changed = ['move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'] # Mouse follows focused window and also update sketchybar

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config option is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
                         "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Force Workspace A to your vertical monitor
[workspace-to-monitor-force-assignment]
A = 'LG HDR 4K'
1 = 'Built-in Retina Display'
2 = 'LU28R55'

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       5
    outer.bottom =     5
    outer.top = [ { monitor."built-in" = 5 }, 45 ]
    outer.right =      5

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    ctrl-alt-cmd-slash = 'layout tiles horizontal vertical'
    ctrl-alt-cmd-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    # Wraps around all the monitors
    # ctrl-alt-cmd-h = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors left'
    # ctrl-alt-cmd-j = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors down'
    # ctrl-alt-cmd-k = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors up'
    # ctrl-alt-cmd-l = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors right'

    # Doesn't wrap
    ctrl-alt-cmd-h = 'focus left --boundaries all-monitors-outer-frame --boundaries-action stop'
    ctrl-alt-cmd-j = 'focus down --boundaries all-monitors-outer-frame --boundaries-action stop'
    ctrl-alt-cmd-k = 'focus up --boundaries all-monitors-outer-frame --boundaries-action stop'
    ctrl-alt-cmd-l = 'focus right --boundaries all-monitors-outer-frame --boundaries-action stop'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    ctrl-alt-cmd-shift-h = 'move left'
    ctrl-alt-cmd-shift-j = 'move down'
    ctrl-alt-cmd-shift-k = 'move up'
    ctrl-alt-cmd-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    ctrl-alt-cmd-minus = 'resize smart -25'
    ctrl-alt-cmd-equal = 'resize smart +25'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    ctrl-alt-cmd-1 = 'workspace 1'
    ctrl-alt-cmd-2 = 'workspace 2'
    ctrl-alt-cmd-3 = 'workspace 3'
    ctrl-alt-cmd-4 = 'workspace 4'
    ctrl-alt-cmd-5 = 'workspace 5'
    ctrl-alt-cmd-6 = 'workspace 6'
    ctrl-alt-cmd-7 = 'workspace 7'
    ctrl-alt-cmd-8 = 'workspace 8'
    ctrl-alt-cmd-9 = 'workspace 9'
    ctrl-alt-cmd-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
    ctrl-alt-cmd-b = 'workspace B'
    ctrl-alt-cmd-c = 'workspace C'
    ctrl-alt-cmd-d = 'workspace D'
    ctrl-alt-cmd-e = 'workspace E'
    ctrl-alt-cmd-f = 'workspace F'
    ctrl-alt-cmd-g = 'workspace G'
    ctrl-alt-cmd-i = 'workspace I'
    ctrl-alt-cmd-m = 'workspace M'
    ctrl-alt-cmd-n = 'workspace N'
    ctrl-alt-cmd-o = 'workspace O'
    ctrl-alt-cmd-p = 'workspace P'
    ctrl-alt-cmd-q = 'workspace Q'
    ctrl-alt-cmd-r = 'workspace R'
    ctrl-alt-cmd-s = 'workspace S'
    ctrl-alt-cmd-t = 'workspace T'
    ctrl-alt-cmd-u = 'workspace U'
    ctrl-alt-cmd-v = 'workspace V'
    ctrl-alt-cmd-w = 'workspace W'
    ctrl-alt-cmd-x = 'workspace X'
    ctrl-alt-cmd-y = 'workspace Y'
    ctrl-alt-cmd-z = 'workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    ctrl-alt-cmd-shift-1 = 'move-node-to-workspace 1'
    ctrl-alt-cmd-shift-2 = 'move-node-to-workspace 2'
    ctrl-alt-cmd-shift-3 = 'move-node-to-workspace 3'
    ctrl-alt-cmd-shift-4 = 'move-node-to-workspace 4'
    ctrl-alt-cmd-shift-5 = 'move-node-to-workspace 5'
    ctrl-alt-cmd-shift-6 = 'move-node-to-workspace 6'
    ctrl-alt-cmd-shift-7 = 'move-node-to-workspace 7'
    ctrl-alt-cmd-shift-8 = 'move-node-to-workspace 8'
    ctrl-alt-cmd-shift-9 = 'move-node-to-workspace 9'
    ctrl-alt-cmd-shift-a = 'move-node-to-workspace A'
    ctrl-alt-cmd-shift-b = 'move-node-to-workspace B'
    ctrl-alt-cmd-shift-c = 'move-node-to-workspace C'
    ctrl-alt-cmd-shift-d = 'move-node-to-workspace D'
    ctrl-alt-cmd-shift-e = 'move-node-to-workspace E'
    ctrl-alt-cmd-shift-f = 'move-node-to-workspace F'
    ctrl-alt-cmd-shift-g = 'move-node-to-workspace G'
    ctrl-alt-cmd-shift-i = 'move-node-to-workspace I'
    ctrl-alt-cmd-shift-m = 'move-node-to-workspace M'
    ctrl-alt-cmd-shift-n = 'move-node-to-workspace N'
    ctrl-alt-cmd-shift-o = 'move-node-to-workspace O'
    ctrl-alt-cmd-shift-p = 'move-node-to-workspace P'
    ctrl-alt-cmd-shift-q = 'move-node-to-workspace Q'
    ctrl-alt-cmd-shift-r = 'move-node-to-workspace R'
    ctrl-alt-cmd-shift-s = 'move-node-to-workspace S'
    ctrl-alt-cmd-shift-t = 'move-node-to-workspace T'
    ctrl-alt-cmd-shift-u = 'move-node-to-workspace U'
    ctrl-alt-cmd-shift-v = 'move-node-to-workspace V'
    ctrl-alt-cmd-shift-w = 'move-node-to-workspace W'
    ctrl-alt-cmd-shift-x = 'move-node-to-workspace X'
    ctrl-alt-cmd-shift-y = 'move-node-to-workspace Y'
    ctrl-alt-cmd-shift-z = 'move-node-to-workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    # alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    ctrl-alt-cmd-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    ctrl-alt-cmd-semicolon = ['mode service', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
    ctrl-alt-cmd-space = ['mode apps', 'exec-and-forget sketchybar --trigger aerospace_mode_change']

    cmd-h = [] # Disable "hide application"
    cmd-alt-h = [] # Disable "hide others"

  # To make certain apps float by default
  [[on-window-detected]]
  if.app-id = 'org.zotero.zotero'
  if.window-title-regex-substring = 'Citation Dialog|Settings'
  run = 'layout floating'

  [[on-window-detected]]
  if.app-id = 'com.apple.finder'
  run = 'layout floating'

  [[on-window-detected]]
  if.app-id = 'com.microsoft.Outlook'
  if.window-title-regex-substring = 'Accounts'
  run = 'layout floating'

  # A very janky way to yank mini browser windows back to the current workspace. Only outlook links need this.
  # [[on-window-detected]]
  # if.app-id = 'company.thebrowser.Browser'
  # if.window-title-regex-substring = '^(?!(Personal|Choate|Space 1)$).+'
  # run = 'exec-and-forget win_id="$(aerospace list-windows --focused --format "%{window-id}")"; sleep 1; aerospace workspace-back-and-forth; sleep 1; aerospace move-node-to-workspace --window-id "$win_id" --focus-follows-window "$(aerospace list-workspaces --focused)"'
  # run = 'exec-and-forget win_id="$(aerospace list-windows --focused --format "%{window-id}")"; sleep 0.1; aerospace layout --window-id "$win_id" floating; aerospace workspace-back-and-forth; aerospace move-node-to-workspace --window-id "$win_id" --focus-follows-window "$(aerospace list-workspaces --focused)"'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
    r = ['flatten-workspace-tree', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change'] # reset layout
    f = ['layout floating tiling', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    ctrl-alt-cmd-shift-h = ['join-with left', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
    ctrl-alt-cmd-shift-j = ['join-with down', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
    ctrl-alt-cmd-shift-k = ['join-with up', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
    ctrl-alt-cmd-shift-l = ['join-with right', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']


    z = ['fullscreen', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE']

    space = ['exec-and-forget nowplaying-cli togglePlayPause', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
    l = ['exec-and-forget nowplaying-cli next', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
    h = ['exec-and-forget nowplaying-cli previous', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']


[mode.apps.binding]
  esc = ['mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']

  a = ['exec-and-forget open /Applications/Safari.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  b = ['exec-and-forget open /Applications/Arc.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  c = ['exec-and-forget open /System/Applications/Calendar.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  f = ['exec-and-forget open /System/Library/CoreServices/Finder.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  i = ['exec-and-forget open -b com.adobe.InDesign', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  m = ['exec-and-forget open /System/Applications/Messages.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  n = ['exec-and-forget open /System/Applications/Notes.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  o = ['exec-and-forget open /Applications/Microsoft\ Outlook.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  r = ['exec-and-forget open /System/Applications/Reminders.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  # s = ['exec-and-forget open /Applications/sioyek.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  t = ['exec-and-forget open /Applications/Ghostty.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  w = ['exec-and-forget open /Applications/Microsoft\ Word.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
  z = ['exec-and-forget open /Applications/Zotero.app', 'mode main', 'exec-and-forget sketchybar --trigger aerospace_mode_change']
